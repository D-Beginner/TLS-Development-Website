<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="24" fill="#1C3545"/>
  <!-- Minimalistic tree icon representing "Pokok" (tree) -->
  <g transform="translate(200,180)" stroke="none">
    <!-- Tree trunk -->
    <rect x="-8" y="30" width="16" height="50" rx="4" fill="#C9943E"/>
    <!-- Tree canopy - geometric triangles -->
    <polygon points="0,-80 -50,10 50,10" fill="#C9943E" opacity="0.9"/>
    <polygon points="0,-50 -40,30 40,30" fill="#C9943E" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="200" y="300" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" letter-spacing="6" fill="white">POKOK SENA</text>
  <text x="200" y="330" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="300" letter-spacing="4" fill="#C9943E">RESIDENCES</text>
  <!-- Thin line accent -->
  <line x1="140" y1="270" x2="260" y2="270" stroke="#C9943E" stroke-width="1" opacity="0.6"/>
</svg>
