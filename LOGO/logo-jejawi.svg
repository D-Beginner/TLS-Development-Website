<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" rx="24" fill="#1C3545"/>
  <!-- Minimalistic house/home icon for Jejawi -->
  <g transform="translate(200,175)" stroke="none">
    <!-- House roof -->
    <polygon points="0,-60 -55,0 55,0" fill="none" stroke="#C9943E" stroke-width="2.5"/>
    <!-- House body -->
    <rect x="-40" y="0" width="80" height="55" rx="2" fill="none" stroke="#C9943E" stroke-width="2.5"/>
    <!-- Door -->
    <rect x="-10" y="20" width="20" height="35" rx="2" fill="#C9943E" opacity="0.4"/>
    <!-- Window left -->
    <rect x="-32" y="12" width="16" height="16" rx="1" fill="none" stroke="#C9943E" stroke-width="1.5" opacity="0.7"/>
    <!-- Window right -->
    <rect x="16" y="12" width="16" height="16" rx="1" fill="none" stroke="#C9943E" stroke-width="1.5" opacity="0.7"/>
  </g>
  <!-- Text -->
  <text x="200" y="295" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" letter-spacing="6" fill="white">JEJAWI</text>
  <text x="200" y="325" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="300" letter-spacing="4" fill="#C9943E">LOT 1171 • PERLIS</text>
  <line x1="150" y1="265" x2="250" y2="265" stroke="#C9943E" stroke-width="1" opacity="0.6"/>
</svg>
